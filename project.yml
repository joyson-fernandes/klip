name: klip
options:
  bundleIdPrefix: com.joyson
  deploymentTarget:
    macOS: "12.3"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.3"
    PRODUCT_BUNDLE_IDENTIFIER: com.joyson.klip

targets:
  klip:
    type: application
    platform: macOS
    sources:
      - klip
      - path: Resources/gifski
        buildPhase: resources
        type: file
      - path: Resources/AppIcon.icns
        buildPhase: resources
        type: file
    settings:
      base:
        INFOPLIST_FILE: klip/Info.plist
        CODE_SIGN_ENTITLEMENTS: klip/klip.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "E5B229B6341D07CBADB83D08A4BBA6CFE931B635"
        DEVELOPMENT_TEAM: 77YLNJXKXT

  klipTests:
    type: bundle.unit-test
    platform: macOS
    sources: klipTests
    dependencies:
      - target: klip
